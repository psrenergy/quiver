name: Detect release version
description: Read the release version from CMakeLists.txt, verify every binding file agrees, and confirm the matching tag is not already on origin.

outputs:
  version:
    description: The release version in MAJOR.MINOR.PATCH form (e.g. 0.7.6).
    value: ${{ steps.extract.outputs.version }}

runs:
  using: composite
  steps:
    - name: Verify all project files agree on the version
      id: extract
      shell: bash
      # scripts/bump_version.py owns the version-file inventory (its TARGETS list) and is the
      # single source of truth for both reading and writing. --check treats CMakeLists.txt as
      # canonical, fails if any binding disagrees, and prints the version on success.
      run: |
        version=$(python3 scripts/bump_version.py --check)
        echo "version=$version" >> "$GITHUB_OUTPUT"

    - name: Check tag does not already exist
      shell: bash
      run: |
        version="${{ steps.extract.outputs.version }}"
        if git rev-parse --verify --quiet "refs/tags/v$version" >/dev/null; then
          echo "::error::Tag v$version already exists locally"
          exit 1
        fi
        if git ls-remote --exit-code --tags origin "refs/tags/v$version" >/dev/null 2>&1; then
          echo "::error::Tag v$version already exists on origin"
          exit 1
        fi
        echo "Tag v$version is available"
