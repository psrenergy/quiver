name: Publish to PyPI (standalone)

# Standalone twin of publish.yml's PyPI job, for debugging the wheel build + publish in isolation.
#
# IMPORTANT — this is intentionally NOT a reusable (workflow_call) workflow, and must stay that way.
# PyPI Trusted Publishing (OIDC) matches the OIDC token's `job_workflow_ref` against the registered
# *workflow filename*; a reusable workflow reports its own ref and PyPI rejects it with
# `invalid-publisher` (pypa/gh-action-pypi-publish#166, pypi/warehouse#11096). So the publish step
# must live in a top-level workflow file. Register THIS filename (publish-pypi.yml) as a second
# PyPI Trusted Publisher alongside publish.yml. Do not "refactor" this into a reusable workflow.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build wheels
    uses: ./.github/workflows/build-wheels.yml

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: wheels
          path: dist/

      - name: Validate wheels
        run: |
          shopt -s nullglob
          wheels=(dist/*.whl)
          if [ ${#wheels[@]} -eq 0 ]; then
            echo "::error::No wheels found in dist/"
            exit 1
          fi
          pip install --quiet twine
          twine check dist/*.whl
          # Ensure every platform target declared in cibuildwheel config is represented.
          required_patterns=(manylinux win_amd64)
          for pat in "${required_patterns[@]}"; do
            if ! ls dist/*${pat}*.whl >/dev/null 2>&1; then
              echo "::error::No wheel matching pattern '*${pat}*' in dist/"
              exit 1
            fi
          done
          echo "Validated ${#wheels[@]} wheel(s)"
      # Publishing is wired but disabled until PyPI release is enabled (mirrors publish.yml).
      # - uses: pypa/gh-action-pypi-publish@v1.14.0
