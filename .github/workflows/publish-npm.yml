name: Publish to npm

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      # Publish with `bun publish` — the binding, tests, and now the publish are 100% Bun, so no
      # Node toolchain is installed. bun-version: latest matches ci.yml's test job.
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Resolve version
        id: ver
        run: echo "version=$(python3 scripts/bump_version.py --check)" >> "$GITHUB_OUTPUT"

      # Download the native libs into bindings/js/libs/{linux,windows}-x86_64/ — the same layout
      # the package.json "files" allowlist ships. native_s3.sh owns the per-platform file list.
      - name: Download native libraries from S3
        run: bash scripts/ci/native_s3.sh download "${{ steps.ver.outputs.version }}" bindings/js/libs

      - name: Verify native libraries are present
        working-directory: bindings/js
        run: |
          required=(
            libs/linux-x86_64/libquiver.so
            # SONAME libquiver_c.so's DT_NEEDED resolves at load time (no Linux preload).
            libs/linux-x86_64/libquiver.so.0
            libs/linux-x86_64/libquiver_c.so
            libs/windows-x86_64/libquiver.dll
            libs/windows-x86_64/libquiver_c.dll
          )
          missing=0
          for f in "${required[@]}"; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing required native library: $f"
              missing=1
            fi
          done
          echo "--- libs/ tree ---"
          find libs -type f | sort
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      # Build the EXACT tarball that will be published, then assert each native lib is inside it by
      # reading the tar table of contents — format-independent, not dependent on any tool's
      # human-readable dry-run wording. `bun pm pack` honors the package.json "files" allowlist,
      # publishConfig, and the empty .npmignore (no .gitignore fallback), so the tarball is ground
      # truth — and we publish this exact tarball below. (Verified: bun roots entries under
      # "package/"; the sed strip + exact-line grep distinguishes libquiver.so from libquiver.so.0.)
      - name: Pack and assert native libs are in the tarball
        id: pack
        working-directory: bindings/js
        run: |
          bun pm pack
          tarball="$(ls -t quiverdb-*.tgz | head -n1)"
          if [ -z "$tarball" ] || [ ! -f "$tarball" ]; then
            echo "::error::bun pm pack did not produce a quiverdb-*.tgz tarball"
            exit 1
          fi
          entries="$(tar -tzf "$tarball" | sed 's#^\./##; s#^[^/]*/##' | sort)"
          echo "--- tarball contents ($tarball) ---"
          echo "$entries"
          for f in \
            libs/linux-x86_64/libquiver.so libs/linux-x86_64/libquiver.so.0 libs/linux-x86_64/libquiver_c.so \
            libs/windows-x86_64/libquiver.dll libs/windows-x86_64/libquiver_c.dll; do
            if ! printf '%s\n' "$entries" | grep -Fxq "$f"; then
              echo "::error::tarball $tarball is MISSING $f"
              exit 1
            fi
          done
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"

      # Belt-and-suspenders auth (oven-sh/bun#24124 still open): set NPM_CONFIG_TOKEN (bun's env var;
      # it does NOT read NODE_AUTH_TOKEN) AND write .npmrc _authToken as a hedge. Written here, AFTER
      # pack, so the token file can never reach the tarball (it is also not in the "files" allowlist).
      # Publishing the prebuilt, verified tarball ships precisely what we asserted above.
      # --tolerate-republish lets a standalone re-dispatch of an already-published version exit 0;
      # --access public is redundant with publishConfig.access but stated so publish never depends on
      # manifest precedence.
      - name: Publish to npm
        working-directory: bindings/js
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_CONFIG_TOKEN" ]; then
            echo "::error::NPM_TOKEN secret is empty or unavailable to this job"
            exit 1
          fi
          printf '//registry.npmjs.org/:_authToken=%s\n' "$NPM_CONFIG_TOKEN" > .npmrc
          bun publish "${{ steps.pack.outputs.tarball }}" --access public --tolerate-republish
