name: Publish to npm

# Publishes the quiverdb npm package. Runnable standalone (workflow_dispatch) — e.g. to debug
# the publish in isolation — and reused by publish.yml (workflow_call). Native libs come from
# S3 (uploaded by build-native), so this is self-sufficient on any run: it never depends on an
# in-run native build. The orchestrator reaches NPM_TOKEN via `secrets: inherit`; a standalone
# dispatch reads it directly.
on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      # Publish with the npm CLI (preinstalled on runners) rather than `bun publish`:
      # bun publish's token auth is unreliable in 1.3.x and falls back to interactive
      # browser login in CI (oven-sh/bun#24124). The binding/tests stay 100% Bun; only
      # this publish step uses npm. setup-node writes an .npmrc wiring NODE_AUTH_TOKEN.
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      # Locate the S3 native libs by version. bump_version.py self-locates the repo and prints
      # only the version to stdout; --check has no tag-absence gate, so a standalone re-publish
      # of an already-tagged version is not blocked (that gate lives in publish.yml).
      - name: Resolve version
        id: ver
        run: echo "version=$(python3 scripts/bump_version.py --check)" >> "$GITHUB_OUTPUT"

      # Download the native libs into bindings/js/libs/{linux,windows}-x86_64/ — the same layout
      # the package.json "files" allowlist ships. native_s3.sh owns the per-platform file list.
      - name: Download native libraries from S3
        run: bash scripts/ci/native_s3.sh download "${{ steps.ver.outputs.version }}" bindings/js/libs

      - name: Verify native libraries are present
        working-directory: bindings/js
        run: |
          required=(
            libs/linux-x86_64/libquiver.so
            # SONAME libquiver_c.so's DT_NEEDED resolves at load time (no Linux preload).
            libs/linux-x86_64/libquiver.so.0
            libs/linux-x86_64/libquiver_c.so
            libs/windows-x86_64/libquiver.dll
            libs/windows-x86_64/libquiver_c.dll
          )
          missing=0
          for f in "${required[@]}"; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing required native library: $f"
              missing=1
            fi
          done
          echo "--- libs/ tree ---"
          find libs -type f | sort
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      # The package.json "files" allowlist ships libs/**; an empty .npmignore stops
      # bun/npm from falling back to .gitignore (which excludes *.so/*.dll). Assert the
      # dry-run packs every native lib before the irreversible publish.
      - name: Dry-run publish and assert libs are included
        working-directory: bindings/js
        run: |
          npm publish --dry-run 2>&1 | tee /tmp/pub-dry.log
          for f in \
            libs/linux-x86_64/libquiver.so libs/linux-x86_64/libquiver.so.0 libs/linux-x86_64/libquiver_c.so \
            libs/windows-x86_64/libquiver.dll libs/windows-x86_64/libquiver_c.dll; do
            if ! grep -F -- "$f" /tmp/pub-dry.log > /dev/null; then
              echo "::error::publish dry-run would NOT include $f"
              exit 1
            fi
          done

      - name: Publish to npm
        working-directory: bindings/js
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::NPM_TOKEN secret is empty or unavailable to this job"
            exit 1
          fi
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
