name: Publish JS

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Override version"
        required: false
        default: ""
      ref:
        description: "Override ref or sha"
        required: false
        default: ""

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          # No package-lock.json in bindings/js (Bun project) — v6 caching would fail.
          package-manager-cache: false

      - name: Ensure npm supports Trusted Publishing
        run: npm install -g npm@latest

      - name: Resolve version
        id: ver
        run: |
          v="${{ inputs.version }}"
          if [ -z "$v" ]; then
            v="$(python3 scripts/assert_version.py)"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Download native libraries from S3
        run: bash scripts/ci/native_s3.sh download "${{ steps.ver.outputs.version }}" bindings/js/libs

      - name: Verify native libraries are present
        working-directory: bindings/js
        run: |
          required=(
            libs/linux-x86_64/libquiver.so
            libs/linux-x86_64/libquiver.so.0
            libs/linux-x86_64/libquiver_c.so
            libs/macos-x86_64/libquiver.dylib
            libs/macos-x86_64/libquiver_c.dylib
            libs/windows-x86_64/libquiver.dll
            libs/windows-x86_64/libquiver_c.dll            
          )
          missing=0
          for f in "${required[@]}"; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing required native library: $f"
              missing=1
            fi
          done
          echo "--- libs/ tree ---"
          find libs -type f | sort
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Pack and assert native libs are in the tarball
        working-directory: bindings/js
        run: |
          npm pack
          tarball="$(ls -t quiverdb-*.tgz | head -n1)"
          if [ -z "$tarball" ] || [ ! -f "$tarball" ]; then
            echo "::error::npm pack did not produce a quiverdb-*.tgz tarball"
            exit 1
          fi
          entries="$(tar -tzf "$tarball" | sed 's#^\./##; s#^[^/]*/##' | sort)"
          echo "--- tarball contents ($tarball) ---"
          echo "$entries"
          for f in \
            libs/linux-x86_64/libquiver.so libs/linux-x86_64/libquiver.so.0 libs/linux-x86_64/libquiver_c.so \
            libs/macos-x86_64/libquiver.dylib libs/macos-x86_64/libquiver_c.dylib \
            libs/windows-x86_64/libquiver.dll libs/windows-x86_64/libquiver_c.dll ; do
            if ! printf '%s\n' "$entries" | grep -Fxq "$f"; then
              echo "::error::tarball $tarball is MISSING $f"
              exit 1
            fi
          done
          rm -f "$tarball"

      - name: Publish to npm (Trusted Publishing / OIDC)
        working-directory: bindings/js
        run: |
          ver="${{ steps.ver.outputs.version }}"
          if npm view "quiverdb@$ver" version >/dev/null 2>&1; then
            echo "quiverdb@$ver already published; skipping"
          else
            # Verbose: the OIDC token exchange result is only logged at this level.
            # Without it, a failed exchange silently falls back to token auth and
            # dies with a misleading E404 on the PUT.
            npm publish --loglevel verbose
          fi
