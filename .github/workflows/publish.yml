name: Publish

on:
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  version:
    name: Resolve version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.v.outputs.version }}
      sha: ${{ steps.v.outputs.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
      - id: v
        run: |
          sha="$(git rev-parse HEAD)"
          v="$(python3 scripts/assert_version.py)"
          if ! [[ "$v" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::resolved version '$v' is not X.Y.Z"
            exit 1
          fi
          # ncipollo/release-action creates the tag iff missing and never moves an existing
          # one, so a stale tag would silently release the wrong commit. Fail here instead.
          # Tags are annotated: compare the peeled (^{}) commit when present.
          existing="$(git ls-remote origin "refs/tags/v$v" "refs/tags/v$v^{}" | tail -n1 | cut -f1)"
          if [ -n "$existing" ] && [ "$existing" != "$sha" ]; then
            echo "::error::tag v$v already exists at ${existing}; bump the version in CMakeLists.txt (and binding manifests) or delete the tag"
            exit 1
          fi
          if [ -n "$existing" ]; then
            echo "tag v$v already points at ${sha} — re-running the release for it"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

  publish-s3:
    name: Publish S3
    runs-on: ubuntu-latest
    needs: version
    timeout-minutes: 30
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
      - name: Dispatch and watch publish-s3.yml
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          DISPATCH_REF: ${{ github.ref_name }}
          VERSION: ${{ needs.version.outputs.version }}
          SHA: ${{ needs.version.outputs.sha }}
        run: bash scripts/ci/dispatch_workflow.sh publish-s3.yml "$DISPATCH_REF" "version=$VERSION" "ref=$SHA"

  release:
    name: Tag and GitHub release
    runs-on: ubuntu-latest
    needs: [version, publish-s3]
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: ncipollo/release-action@v1
        with:
          tag: v${{ needs.version.outputs.version }}
          commit: ${{ needs.version.outputs.sha }}
          generateReleaseNotes: true
          skipIfReleaseExists: true
          makeLatest: "true"

  publish-julia:
    name: Publish Julia
    runs-on: ubuntu-latest
    needs: [version, release]
    timeout-minutes: 20
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
      - name: Dispatch and watch publish-julia.yml
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ needs.version.outputs.version }}
        run: bash scripts/ci/dispatch_workflow.sh publish-julia.yml "v$VERSION" "version=$VERSION"

  publish-python:
    name: Publish Python
    runs-on: ubuntu-latest
    needs: [version, release]
    timeout-minutes: 30
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
      - name: Dispatch and watch publish-python.yml
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ needs.version.outputs.version }}
        run: bash scripts/ci/dispatch_workflow.sh publish-python.yml "v$VERSION"

  publish-js:
    name: Publish JS
    runs-on: ubuntu-latest
    needs: [version, release]
    timeout-minutes: 15
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
      - name: Dispatch and watch publish-js.yml
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ needs.version.outputs.version }}
        run: bash scripts/ci/dispatch_workflow.sh publish-js.yml "v$VERSION" "version=$VERSION"
