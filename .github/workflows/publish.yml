name: Publish

on:
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

# Thin orchestrator. The heavy lifting lives in independently-runnable workflows:
#   build-native.yml  -> builds native libs once, uploads them to S3 by version
#   build-wheels.yml  -> builds the Python wheels (also runs on every push/PR)
#   publish-npm.yml   -> downloads native libs from S3, publishes to npm
#   publish-julia.yml -> downloads native libs from S3, opens the Quiver.jl PR
# This file only sequences them and keeps the orchestration-only glue (version gate, tag, PyPI
# publish, GitHub Release, version bump) that has no meaning when run standalone.
#
# PyPI is published INLINE here (not via a reusable workflow) because OIDC Trusted Publishing
# matches the workflow filename; a reusable workflow would be rejected with `invalid-publisher`
# (see publish-pypi.yml for the standalone debug twin and the full rationale).
#
# Deny-by-default: jobs that need more (create-tag, publish-pypi, github-release, bump-version)
# opt up in their own permissions block; the called workflows declare their own.
permissions:
  contents: read

jobs:
  detect-version:
    name: Detect version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.detect.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - id: detect
        uses: ./.github/actions/detect-version

  # Build native libs once and stage them in S3. npm and Julia download from there, so they
  # never rebuild and have no in-run artifact dependency on this job.
  build-native:
    name: Build native libs
    needs: detect-version
    uses: ./.github/workflows/build-native.yml

  # Reuse the same build+merge jobs CI runs on every push, so the release can never
  # drift from what was validated on master. (build-wheels.yml exposes workflow_call.)
  build-wheels:
    name: Build wheels
    needs: detect-version
    uses: ./.github/workflows/build-wheels.yml

  validate-release:
    name: Validate release
    runs-on: ubuntu-latest
    needs: build-wheels
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: wheels
          path: dist/

      - name: Validate wheels
        run: |
          shopt -s nullglob
          wheels=(dist/*.whl)
          if [ ${#wheels[@]} -eq 0 ]; then
            echo "::error::No wheels found in dist/"
            exit 1
          fi
          pip install --quiet twine
          twine check dist/*.whl
          # Ensure every platform target declared in cibuildwheel config is represented.
          required_patterns=(manylinux win_amd64)
          for pat in "${required_patterns[@]}"; do
            if ! ls dist/*${pat}*.whl >/dev/null 2>&1; then
              echo "::error::No wheel matching pattern '*${pat}*' in dist/"
              exit 1
            fi
          done
          echo "Validated ${#wheels[@]} wheel(s)"

  # Push the tag once the build is proven good, BEFORE any irreversible publish. A tag is the one
  # fully reversible artifact (just delete it), so a push failure here aborts the run while nothing
  # is live yet — instead of stranding published packages with no tag and no GitHub Release.
  # build-native completing (incl. its S3 upload) is part of that proof: the libs are in S3 before
  # the tag exists, so the publish jobs below will find them.
  # RECOVERY: if a later publish step fails AFTER this tag is pushed, a re-run aborts at
  # detect-version's "tag already exists on origin" check. Delete the tag before re-running:
  #   git push --delete origin v<version>
  create-tag:
    name: Create and push tag
    runs-on: ubuntu-latest
    needs: [detect-version, validate-release, build-native]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - name: Create and push tag
        run: |
          version="${{ needs.detect-version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v$version" -m "Release v$version"
          git push origin "v$version"

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [validate-release, create-tag]
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: wheels
          path: dist/
      # - uses: pypa/gh-action-pypi-publish@v1.14.0

  publish-npm:
    name: Publish to npm
    needs: [build-native, create-tag]
    uses: ./.github/workflows/publish-npm.yml
    secrets: inherit

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [detect-version, publish-pypi, publish-npm]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: wheels
          path: dist/

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.detect-version.outputs.version }}
          generate_release_notes: true
          files: dist/*.whl

  bump-version:
    name: Open version bump PR
    runs-on: ubuntu-latest
    needs: [detect-version, github-release]
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - name: Compute next patch version
        id: next
        run: |
          IFS='.' read -r major minor patch <<< "${{ needs.detect-version.outputs.version }}"
          echo "version=${major}.${minor}.$((patch+1))" >> "$GITHUB_OUTPUT"

      - name: Bump version in all project files
        run: python3 scripts/bump_version.py "${{ steps.next.outputs.version }}"

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          branch: bump-version/${{ steps.next.outputs.version }}
          base: master
          commit-message: "bump version to ${{ steps.next.outputs.version }}"
          title: "Bump version to ${{ steps.next.outputs.version }}"
          body: Auto-generated after release `v${{ needs.detect-version.outputs.version }}`.
          delete-branch: true

  publish-julia:
    name: Publish Julia (PR to Quiver.jl)
    needs: [build-native, github-release]
    uses: ./.github/workflows/publish-julia.yml
    secrets: inherit
