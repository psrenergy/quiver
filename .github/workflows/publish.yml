name: Publish

on:
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

# Thin orchestrator. The heavy lifting lives in independently-runnable workflows:
#   build-native.yml  -> builds native libs once, uploads them to S3 by version
#   build-wheels.yml  -> builds the Python wheels (also runs on every push/PR)
#   publish-npm.yml   -> downloads native libs from S3, publishes to npm
#   publish-julia.yml -> downloads native libs from S3, opens the Quiver.jl PR
# This file sequences them: prove the native build, cut the release (tag + GitHub Release), then
# run the registry publishes (each independently re-runnable), then open the version-bump PR.
#
# PyPI is published INLINE here (not via a reusable workflow) because OIDC Trusted Publishing
# matches the workflow filename; a reusable workflow would be rejected with `invalid-publisher`
# (see publish-pypi.yml for the standalone debug twin and the full rationale).
#
# Deny-by-default: jobs that need more (release, publish-pypi, bump-version) opt up in their own
# permissions block; the called workflows declare their own.
permissions:
  contents: read

jobs:
  detect-version:
    name: Detect version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.detect.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - id: detect
        uses: ./.github/actions/detect-version

  # Build native libs once and stage them in S3. npm and Julia download from there, so they
  # never rebuild and have no in-run artifact dependency on this job.
  build-native:
    name: Build native libs
    needs: detect-version
    uses: ./.github/workflows/build-native.yml

  # Cut the release once the native build is proven good, BEFORE any irreversible registry publish:
  # push the tag and create the GitHub Release. The tag/release is the reversible "cut" (PyPI/npm
  # reject re-publishing a version, so they are not). build-native completing (incl. its S3 upload)
  # is part of that proof — the libs are in S3 before the tag exists, so the publish jobs find them.
  # RECOVERY: if a publish fails AFTER this point, re-run that target's standalone workflow
  # (publish-pypi.yml / publish-npm.yml / publish-julia.yml) — NOT this whole workflow, which would
  # abort at detect-version's "tag already exists on origin" check. Delete the tag only to redo the
  # entire release:  git push --delete origin v<version>
  release:
    name: Release (tag + GitHub Release)
    runs-on: ubuntu-latest
    needs: [detect-version, build-native]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - uses: ncipollo/release-action@v1
        with:
          tag: v${{ needs.detect-version.outputs.version }}
          generateReleaseNotes: true

  # PyPI owns its wheels end-to-end: build (the same reusable job CI runs on every push) then
  # validate + publish below. Built after the release cut.
  build-wheels:
    name: Build wheels
    needs: release
    uses: ./.github/workflows/build-wheels.yml

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build-wheels
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: wheels
          path: dist/

      - name: Validate wheels
        run: |
          shopt -s nullglob
          wheels=(dist/*.whl)
          if [ ${#wheels[@]} -eq 0 ]; then
            echo "::error::No wheels found in dist/"
            exit 1
          fi
          pip install --quiet twine
          twine check dist/*.whl
          # Ensure every platform target declared in cibuildwheel config is represented.
          required_patterns=(manylinux win_amd64)
          for pat in "${required_patterns[@]}"; do
            if ! ls dist/*${pat}*.whl >/dev/null 2>&1; then
              echo "::error::No wheel matching pattern '*${pat}*' in dist/"
              exit 1
            fi
          done
          echo "Validated ${#wheels[@]} wheel(s)"
      # - uses: pypa/gh-action-pypi-publish@v1.14.0

  publish-npm:
    name: Publish to npm
    needs: release
    uses: ./.github/workflows/publish-npm.yml
    secrets: inherit

  publish-julia:
    name: Publish Julia (PR to Quiver.jl)
    needs: release
    uses: ./.github/workflows/publish-julia.yml
    secrets: inherit

  bump-version:
    name: Open version bump PR
    runs-on: ubuntu-latest
    needs: [detect-version, publish-pypi, publish-npm]
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - name: Compute next patch version
        id: next
        run: |
          IFS='.' read -r major minor patch <<< "${{ needs.detect-version.outputs.version }}"
          echo "version=${major}.${minor}.$((patch+1))" >> "$GITHUB_OUTPUT"

      - name: Bump version in all project files
        run: python3 scripts/bump_version.py "${{ steps.next.outputs.version }}"

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          branch: bump-version/${{ steps.next.outputs.version }}
          base: master
          commit-message: "bump version to ${{ steps.next.outputs.version }}"
          title: "Bump version to ${{ steps.next.outputs.version }}"
          body: Auto-generated after release `v${{ needs.detect-version.outputs.version }}`.
          delete-branch: true
