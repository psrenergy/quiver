name: Publish

on:
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

# Deny-by-default: jobs that need more (publish-pypi, create-tag, github-release,
# bump-version, publish-jsr, publish-julia) opt up in their own permissions block.
permissions:
  contents: read

jobs:
  detect-version:
    name: Detect version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.detect.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - id: detect
        uses: ./.github/actions/detect-version

  # Reuse the same build+merge jobs CI runs on every push, so the release can never
  # drift from what was validated on master. (build-wheels.yml exposes workflow_call.)
  build-wheels:
    name: Build wheels
    needs: detect-version
    uses: ./.github/workflows/build-wheels.yml

  validate-release:
    name: Validate release
    runs-on: ubuntu-latest
    needs: build-wheels
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: wheels
          path: dist/

      - name: Validate wheels
        run: |
          shopt -s nullglob
          wheels=(dist/*.whl)
          if [ ${#wheels[@]} -eq 0 ]; then
            echo "::error::No wheels found in dist/"
            exit 1
          fi
          pip install --quiet twine
          twine check dist/*.whl
          # Ensure every platform target declared in cibuildwheel config is represented.
          required_patterns=(manylinux win_amd64)
          for pat in "${required_patterns[@]}"; do
            if ! ls dist/*${pat}*.whl >/dev/null 2>&1; then
              echo "::error::No wheel matching pattern '*${pat}*' in dist/"
              exit 1
            fi
          done
          echo "Validated ${#wheels[@]} wheel(s)"

  build-native:
    name: Build native libs (${{ matrix.platform_key }})
    runs-on: ${{ matrix.os }}
    needs: detect-version
    strategy:
      fail-fast: true
      matrix:
        include:
          # Ship the unversioned name AND the SONAME. The Linux build sets SOVERSION on both
          # quiver and quiver_c (src/CMakeLists.txt), so libquiver_c.so's DT_NEEDED is the
          # SONAME "libquiver.so.0" — that exact name must be present for the bundled npm
          # loader to resolve it via RPATH=$ORIGIN (the loader does no core preload on
          # Linux). Exact names, not a glob, so upload-artifact (which dereferences symlinks)
          # doesn't also ship the redundant patch-level libquiver.so.0.8.3 / libquiver_c.so.0
          # / libquiver_c.so.0.8.3 copies.
          - os: ubuntu-latest
            platform_key: linux-x86_64
            lib_paths: |
              build/lib/libquiver.so
              build/lib/libquiver.so.0
              build/lib/libquiver_c.so
          # DLLs have no SOVERSION chain and the import .lib lives in build/lib, so only the two
          # runtime DLLs live here. List them exactly (not a libquiver* glob) so a Release build's
          # libquiver*.pdb debug symbols aren't swept into the artifact and the JSR/Julia packages.
          - os: windows-latest
            platform_key: windows-x86_64
            lib_paths: |
              build/bin/Release/libquiver.dll
              build/bin/Release/libquiver_c.dll

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - uses: ./.github/actions/build-cpp
        with:
          build_type: Release
          build_tests: "OFF"

      - name: Set RPATH for Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y patchelf
          patchelf --set-rpath '$ORIGIN' build/lib/libquiver_c.so

      - uses: actions/upload-artifact@v7
        with:
          name: native-${{ matrix.platform_key }}
          path: ${{ matrix.lib_paths }}

  # Push the tag once the build is proven good, BEFORE any irreversible publish. A tag is the one
  # fully reversible artifact (just delete it), so a push failure here aborts the run while nothing
  # is live yet — instead of stranding published packages with no tag and no GitHub Release.
  # RECOVERY: if a later publish step fails AFTER this tag is pushed, a re-run aborts at
  # detect-version's "tag already exists on origin" check. Delete the tag before re-running:
  #   git push --delete origin v<version>
  create-tag:
    name: Create and push tag
    runs-on: ubuntu-latest
    needs: [detect-version, validate-release, build-native]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - name: Create and push tag
        run: |
          version="${{ needs.detect-version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v$version" -m "Release v$version"
          git push origin "v$version"

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [validate-release, create-tag]
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: wheels
          path: dist/

      # SHA-pinned (not @release/v1): this is the one step holding trusted-publishing
      # credentials for an irreversible PyPI upload. Dependabot still bumps the SHA.
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [validate-release, build-native, create-tag]
    environment: npm
    permissions:
      contents: read
    defaults:
      run:
        working-directory: bindings/js
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      # Publish with the npm CLI (preinstalled on runners) rather than `bun publish`:
      # bun publish's token auth is unreliable in 1.3.x and falls back to interactive
      # browser login in CI (oven-sh/bun#24124). The binding/tests stay 100% Bun; only
      # this publish step uses npm. setup-node writes an .npmrc wiring NODE_AUTH_TOKEN.
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      # download-artifact `path` is workspace-relative (working-directory does not apply to
      # `uses:` steps), so these write to <workspace>/bindings/js/libs/... — the same place the
      # `libs/...` paths in the run: steps below resolve to from the bindings/js working dir.
      - name: Download Linux x86_64 native libraries
        uses: actions/download-artifact@v8
        with:
          name: native-linux-x86_64
          path: bindings/js/libs/linux-x86_64/

      - name: Download Windows x86_64 native libraries
        uses: actions/download-artifact@v8
        with:
          name: native-windows-x86_64
          path: bindings/js/libs/windows-x86_64/

      - name: Verify native libraries are present
        run: |
          required=(
            libs/linux-x86_64/libquiver.so
            # SONAME libquiver_c.so's DT_NEEDED resolves at load time (no Linux preload).
            libs/linux-x86_64/libquiver.so.0
            libs/linux-x86_64/libquiver_c.so
            libs/windows-x86_64/libquiver.dll
            libs/windows-x86_64/libquiver_c.dll
          )
          missing=0
          for f in "${required[@]}"; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing required native library: $f"
              missing=1
            fi
          done
          echo "--- libs/ tree ---"
          find libs -type f | sort
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      # The package.json "files" allowlist ships libs/**; an empty .npmignore stops
      # bun/npm from falling back to .gitignore (which excludes *.so/*.dll). Assert the
      # dry-run packs every native lib before the irreversible publish.
      - name: Dry-run publish and assert libs are included
        run: |
          npm publish --dry-run 2>&1 | tee /tmp/pub-dry.log
          for f in \
            libs/linux-x86_64/libquiver.so libs/linux-x86_64/libquiver.so.0 libs/linux-x86_64/libquiver_c.so \
            libs/windows-x86_64/libquiver.dll libs/windows-x86_64/libquiver_c.dll; do
            if ! grep -F -- "$f" /tmp/pub-dry.log > /dev/null; then
              echo "::error::publish dry-run would NOT include $f"
              exit 1
            fi
          done

      - name: Publish to npm
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::NPM_TOKEN secret is empty or unavailable to this job"
            exit 1
          fi
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # The tag already exists (create-tag); this only attaches the wheels and release notes to it.
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [detect-version, publish-pypi, publish-npm]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: wheels
          path: dist/

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.detect-version.outputs.version }}
          generate_release_notes: true
          files: dist/*.whl

  bump-version:
    name: Open version bump PR
    runs-on: ubuntu-latest
    needs: [detect-version, github-release]
    permissions:
      contents: write
      pull-requests: write
    steps:
      # Bump from the released commit (every other job pins github.sha); the PR still targets master.
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - name: Compute next patch version
        id: next
        run: |
          IFS='.' read -r major minor patch <<< "${{ needs.detect-version.outputs.version }}"
          echo "version=${major}.${minor}.$((patch+1))" >> "$GITHUB_OUTPUT"

      - name: Bump version in all project files
        run: python3 scripts/bump_version.py "${{ steps.next.outputs.version }}"

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          branch: bump-version/${{ steps.next.outputs.version }}
          base: master
          commit-message: "bump version to ${{ steps.next.outputs.version }}"
          title: "Bump version to ${{ steps.next.outputs.version }}"
          body: |
            Auto-generated after release `v${{ needs.detect-version.outputs.version }}`.

            Bumps every project version file to the next patch:
            - `CMakeLists.txt`
            - `bindings/python/pyproject.toml`
            - `bindings/js/package.json`
            - `bindings/dart/pubspec.yaml`
            - `bindings/julia/Project.toml`
          delete-branch: true

  publish-julia:
    name: Publish Julia (PR to Quiver.jl)
    runs-on: [self-hosted, linux]
    needs: [detect-version, build-native, github-release]
    permissions:
      contents: read
    steps:
      - name: Checkout quiver
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - uses: julia-actions/setup-julia@v3
        with:
          version: "1.11"

      - name: Download Linux x86_64 native libraries
        uses: actions/download-artifact@v8
        with:
          name: native-linux-x86_64
          path: native/linux-x86_64

      - name: Download Windows x86_64 native libraries
        uses: actions/download-artifact@v8
        with:
          name: native-windows-x86_64
          path: native/windows-x86_64

      - name: Build tarballs, upload to S3, generate Artifacts.toml
        run: |
          julia scripts/julia/generate_artifacts.jl \
            --version "${{ needs.detect-version.outputs.version }}" \
            --output "$RUNNER_TEMP/Artifacts.toml" \
            --platform linux-x86_64 native/linux-x86_64 \
            --platform windows-x86_64 native/windows-x86_64

      - name: Checkout Quiver.jl
        uses: actions/checkout@v6
        with:
          repository: psrenergy/Quiver.jl
          ref: master
          token: ${{ secrets.QUIVER_JL_TOKEN }}
          path: quiver-jl

      - name: Assemble generated mirror
        run: |
          set -euo pipefail
          # Faithful FULL mirror of the bindings/julia package — bindings/julia is the single
          # source of truth; Quiver.jl is generated, never hand-edited. Wipe the mirror (keep only
          # its .git/), copy the ENTIRE tree (incl. dotfiles: .github/ with the mirror's CI.yml +
          # TagBot.yml, README.md, .gitignore, .gitattributes, .JuliaFormatter.toml, Project.toml —
          # verbatim, the binding shares Quiver.jl's UUID), then overlay the real test schemas
          # (repo-root tests/schemas; bindings/julia/test/schemas is an empty stub) and the generated
          # Artifacts.toml. The PR deletes anything in Quiver.jl not present here. Manifest.toml is
          # dropped defensively (gitignored, normally absent from a clean checkout).
          find quiver-jl -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -a bindings/julia/. quiver-jl/
          rm -f quiver-jl/Manifest.toml
          rm -rf quiver-jl/test/schemas
          cp -a tests/schemas quiver-jl/test/schemas
          cp "$RUNNER_TEMP/Artifacts.toml" quiver-jl/Artifacts.toml

      - name: Open pull request to Quiver.jl
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.QUIVER_JL_TOKEN }}
          path: quiver-jl
          branch: release/v${{ needs.detect-version.outputs.version }}
          base: master
          commit-message: "Release v${{ needs.detect-version.outputs.version }}"
          title: "Release v${{ needs.detect-version.outputs.version }}"
          body: |
            Auto-generated mirror from `psrenergy/quiver@v${{ needs.detect-version.outputs.version }}`.

            - Mirrored the full `bindings/julia/` package (src, test, `.github/`, README, configs)
            - Overlaid test schemas from `tests/schemas/`
            - Regenerated `Artifacts.toml` (binaries uploaded to S3)
            - Version `${{ needs.detect-version.outputs.version }}` (from `bindings/julia/Project.toml`)

            > Do not hand-edit this repository, it is generated from `psrenergy/quiver/bindings/julia`.
          delete-branch: true
