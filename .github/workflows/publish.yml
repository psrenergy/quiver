name: Publish

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6

      - uses: pypa/cibuildwheel@v3.4.1
        with:
          package-dir: bindings/python
          output-dir: wheelhouse

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  merge:
    name: Merge wheel artifacts
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/upload-artifact/merge@v7
        with:
          name: wheels
          pattern: wheels-*
          delete-merged: true

  validate:
    name: Validate release
    runs-on: ubuntu-latest
    needs: merge
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: wheels
          path: dist/

      - name: Validate tag matches pyproject.toml version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('bindings/python/pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) != pyproject.toml version ($PKG_VERSION)"
            exit 1
          fi
          echo "Version validated: $TAG_VERSION"

      - name: Validate wheel count
        run: |
          WHEEL_COUNT=$(ls dist/*.whl | wc -l)
          if [ "$WHEEL_COUNT" -ne 2 ]; then
            echo "::error::Expected 2 wheels, found $WHEEL_COUNT"
            exit 1
          fi
          echo "Wheel count validated: $WHEEL_COUNT"

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: wheels
          path: dist/

      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: dist/*.whl

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: validate
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: wheels
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1

  build-native-npm:
    name: Build native libs (${{ matrix.platform_key }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: windows-latest
            platform_key: win32-x64
            lib_dir: build/bin/Release
          - os: ubuntu-latest
            platform_key: linux-x64
            lib_dir: build/lib

    steps:
      - uses: actions/checkout@v6

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DQUIVER_BUILD_C_API=ON -DQUIVER_BUILD_TESTS=OFF

      - name: Build
        run: cmake --build build --config Release

      - name: Set RPATH for Linux
        if: runner.os == 'Linux'
        run: patchelf --set-rpath '$ORIGIN' build/lib/libquiver_c.so

      - uses: actions/upload-artifact@v7
        with:
          name: native-${{ matrix.platform_key }}
          path: ${{ matrix.lib_dir }}/libquiver*

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build-native-npm
    environment: npm
    permissions:
      id-token: write
    defaults:
      run:
        working-directory: bindings/js
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Validate tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) != package.json version ($PKG_VERSION)"
            exit 1
          fi
          echo "Version validated: $TAG_VERSION"

      - uses: actions/download-artifact@v8
        with:
          name: native-win32-x64
          path: bindings/js/libs/win32-x64

      - uses: actions/download-artifact@v8
        with:
          name: native-linux-x64
          path: bindings/js/libs/linux-x64

      - name: Verify native libs
        run: |
          echo "Windows libs:" && ls -la libs/win32-x64/
          echo "Linux libs:" && ls -la libs/linux-x64/

      - run: npm install
      - run: npm run build
      - run: npm publish --provenance --access public
