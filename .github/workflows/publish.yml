name: Publish

on:
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect-version:
    name: Detect version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.detect.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - id: detect
        uses: ./.github/actions/detect-version

  build:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: detect-version
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - uses: pypa/cibuildwheel@v3.4.1
        with:
          package-dir: bindings/python
          output-dir: wheelhouse

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  merge:
    name: Merge wheel artifacts
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/upload-artifact/merge@v7
        with:
          name: wheels
          pattern: wheels-*
          delete-merged: true

  validate-release:
    name: Validate release
    runs-on: ubuntu-latest
    needs: merge
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: wheels
          path: dist/

      - name: Validate wheels
        run: |
          shopt -s nullglob
          wheels=(dist/*.whl)
          if [ ${#wheels[@]} -eq 0 ]; then
            echo "::error::No wheels found in dist/"
            exit 1
          fi
          pip install --quiet twine
          twine check dist/*.whl
          # Ensure every platform target declared in cibuildwheel config is represented.
          required_patterns=(manylinux win_amd64)
          for pat in "${required_patterns[@]}"; do
            if ! ls dist/*${pat}*.whl >/dev/null 2>&1; then
              echo "::error::No wheel matching pattern '*${pat}*' in dist/"
              exit 1
            fi
          done
          echo "Validated ${#wheels[@]} wheel(s)"

  build-native:
    name: Build native libs (${{ matrix.platform_key }})
    runs-on: ${{ matrix.os }}
    needs: detect-version
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            platform_key: linux-x86_64
            lib_glob: build/lib/libquiver*
          - os: windows-latest
            platform_key: windows-x86_64
            lib_glob: build/bin/Release/libquiver*

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - uses: ./.github/actions/build-cpp
        with:
          build_type: Release
          build_tests: "OFF"

      - name: Set RPATH for Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y patchelf
          patchelf --set-rpath '$ORIGIN' build/lib/libquiver_c.so

      - uses: actions/upload-artifact@v7
        with:
          name: native-${{ matrix.platform_key }}
          path: ${{ matrix.lib_glob }}

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: validate-release
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: wheels
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1

  publish-jsr:
    name: Publish to JSR
    runs-on: ubuntu-latest
    needs: [validate-release, build-native]
    environment: jsr
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: bindings/js
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - uses: denoland/setup-deno@v2
        with:
          cache: true
          deno-version: v2.7.12

      - name: Download Linux x86_64 native libraries
        uses: actions/download-artifact@v8
        with:
          name: native-linux-x86_64
          path: bindings/js/libs/linux-x86_64/

      - name: Download Windows x86_64 native libraries
        uses: actions/download-artifact@v8
        with:
          name: native-windows-x86_64
          path: bindings/js/libs/windows-x86_64/

      - name: Verify native libraries are present
        run: |
          set -e
          required=(
            libs/linux-x86_64/libquiver.so
            libs/linux-x86_64/libquiver_c.so
            libs/windows-x86_64/libquiver.dll
            libs/windows-x86_64/libquiver_c.dll
          )
          missing=0
          for f in "${required[@]}"; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing required native library: $f"
              missing=1
            fi
          done
          echo "--- libs/ tree ---"
          find libs -type f | sort
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      # `jsr publish` respects .gitignore even when publish.include has a glob
      # (denoland/deno#22790). bindings/js/.gitignore negates *.so/*.dll rules
      # for libs/, but fail early if something still wants to exclude them.
      # --allow-dirty is required because libs/ is populated from CI artifacts,
      # not committed to git.
      - name: Dry-run jsr publish and assert libs are included
        run: |
          set -e
          npx jsr publish --dry-run --allow-slow-types --allow-dirty 2>&1 | tee /tmp/jsr-dry.log
          for f in libs/linux-x86_64/libquiver_c.so libs/windows-x86_64/libquiver_c.dll; do
            if ! grep -F -- "$f" /tmp/jsr-dry.log > /dev/null; then
              echo "::error::jsr publish dry-run would NOT include $f"
              exit 1
            fi
          done

      - name: Publish to JSR
        run: npx jsr publish --allow-slow-types --allow-dirty

  # TODO: change PR to point to the original repo instead of the fork after testing
  publish-yggdrasil:
    name: Publish to Yggdrasil and update Quiver.jl
    runs-on: ubuntu-latest
    needs: [detect-version, validate-release]
    steps:
      - name: Fork Yggdrasil and open update PR
        env:
          GH_TOKEN: ${{ secrets.YGGDRASIL_PR_TOKEN }}
          VERSION: ${{ needs.detect-version.outputs.version }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -e

          if [ -z "$GH_TOKEN" ]; then
            echo "::error::YGGDRASIL_PR_TOKEN secret is not set"
            exit 1
          fi

          fork_owner=$(gh api user --jq .login)

          # Idempotent fork: gh repo fork is a no-op if the fork already exists.
          gh repo fork JuliaPackaging/Yggdrasil --clone=false --remote=false

          # Wait for fork to be ready (fresh forks may 404 briefly).
          for _ in $(seq 1 30); do
            if gh api "repos/${fork_owner}/Yggdrasil" >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/${fork_owner}/Yggdrasil.git" yggdrasil
          cd yggdrasil

          # Sync fork's master with upstream so the branch is based on latest.
          git remote add upstream https://github.com/JuliaPackaging/Yggdrasil.git
          git fetch upstream master
          git reset --hard upstream/master

          branch="quiver-${VERSION}"
          git checkout -b "$branch"

          file=Q/Quiver/build_tarballs.jl
          if [ ! -f "$file" ]; then
            echo "::error::$file not found in Yggdrasil"
            exit 1
          fi

          # Line 4: version = v"X.Y.Z"
          sed -i -E "4s/v\"[^\"]+\"/v\"${VERSION}\"/" "$file"
          # Line 10: GitSource git hash (quoted SHA on its own line, inside GitSource(...))
          sed -i -E "10s/\"[0-9a-f]{40}\"/\"${COMMIT_SHA}\"/" "$file"

          echo "--- diff ---"
          git --no-pager diff "$file"

          # Verify the two target lines now contain the expected values.
          if ! sed -n '4p' "$file" | grep -qF "v\"${VERSION}\""; then
            echo "::error::Line 4 was not updated to version ${VERSION}"
            exit 1
          fi
          if ! sed -n '10p' "$file" | grep -qF "\"${COMMIT_SHA}\""; then
            echo "::error::Line 10 was not updated to commit ${COMMIT_SHA}"
            exit 1
          fi

          git add "$file"
          git commit -m "[Quiver] Update to v${VERSION}"
          git push --force origin "$branch"

          # TESTING: PR targets the fork itself, not upstream JuliaPackaging/Yggdrasil.
          # Switch --repo back to JuliaPackaging/Yggdrasil and --head to "${fork_owner}:${branch}" when ready.
          gh pr create \
            --repo "${fork_owner}/Yggdrasil" \
            --base master \
            --head "$branch" \
            --title "[Quiver] Update to v${VERSION}" \
            --body "Bumps Quiver to v${VERSION} (commit ${COMMIT_SHA})."

  publish-quiver-jl:
    name: Sync sources to Quiver.jl
    runs-on: ubuntu-latest
    needs: [detect-version, validate-release]
    steps:
      - name: Checkout Quiver
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          path: quiver

      - name: Sync sources and open PR on Quiver.jl
        env:
          GH_TOKEN: ${{ secrets.QUIVER_JL_PR_TOKEN }}
          VERSION: ${{ needs.detect-version.outputs.version }}
        run: |
          set -e

          if [ -z "$GH_TOKEN" ]; then
            echo "::error::QUIVER_JL_PR_TOKEN secret is not set"
            exit 1
          fi

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git clone "https://x-access-token:${GH_TOKEN}@github.com/psrenergy/Quiver.jl.git" quiver-jl
          cd quiver-jl

          branch="sync/v${VERSION}"
          git checkout -b "$branch"

          # Replace src/, test/ (preserving test/schemas semantics by removing first).
          rm -rf src test/schemas
          # Wipe test/*.jl and test runners but keep the dir so we can recreate it.
          find test -maxdepth 1 -type f -delete
          cp -R ../quiver/bindings/julia/src ./src
          cp -R ../quiver/bindings/julia/test/. ./test/
          cp -R ../quiver/tests/schemas ./test/schemas

          # Rewrite fixture.jl and c_api.jl in one shot to avoid heredoc/YAML-indent traps.
          python3 -c '
          from pathlib import Path
          Path("test/fixture.jl").write_text(
              "function tests_path()\n    return @__DIR__\nend\n"
          )
          p = Path("src/c_api.jl")
          text = p.read_text()
          marker = "@cenum quiver_error_t"
          idx = text.find(marker)
          if idx == -1:
              raise SystemExit("c_api.jl: could not find @cenum quiver_error_t marker")
          header = (
              "module C\n\n"
              "#! format: off\n\n"
              "using CEnum\n"
              "import Quiver_jll: libquiver_c\n\n"
          )
          p.write_text(header + text[idx:])
          '

          # Sanity-check the rewrites.
          grep -qF 'return @__DIR__' test/fixture.jl
          grep -qF 'import Quiver_jll: libquiver_c' src/c_api.jl
          ! grep -qF 'joinpath(@__DIR__, "..", "..", "..", "build"' src/c_api.jl

          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to sync — skipping PR."
            exit 0
          fi

          git add -A
          git commit -m "Sync sources from quiver v${VERSION}"
          git push --force origin "$branch"

          gh pr create \
            --repo psrenergy/Quiver.jl \
            --base master \
            --head "$branch" \
            --title "Sync sources from quiver v${VERSION}" \
            --body "Syncs \`src/\`, \`test/\`, and \`test/schemas/\` from psrenergy/quiver@${{ github.sha }} (v${VERSION})."

  tag-and-release:
    name: Tag and GitHub Release
    runs-on: ubuntu-latest
    needs: [detect-version, publish-pypi, publish-jsr]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - uses: actions/download-artifact@v8
        with:
          name: wheels
          path: dist/

      - name: Create and push tag
        run: |
          set -e
          version="${{ needs.detect-version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v$version" -m "Release v$version"
          git push origin "v$version"

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.detect-version.outputs.version }}
          generate_release_notes: true
          files: dist/*.whl

  bump-version:
    name: Open version bump PR
    runs-on: ubuntu-latest
    needs: [detect-version, tag-and-release]
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: master

      - name: Compute next patch version
        id: next
        run: |
          IFS='.' read -r major minor patch <<< "${{ needs.detect-version.outputs.version }}"
          echo "version=${major}.${minor}.$((patch+1))" >> "$GITHUB_OUTPUT"

      - name: Bump version in all project files
        run: python3 scripts/bump_version.py "${{ steps.next.outputs.version }}"

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          branch: bump-version/${{ steps.next.outputs.version }}
          base: master
          commit-message: "bump version to ${{ steps.next.outputs.version }}"
          title: "Bump version to ${{ steps.next.outputs.version }}"
          body: |
            Auto-generated after release `v${{ needs.detect-version.outputs.version }}`.

            Bumps every project version file to the next patch:
            - `CMakeLists.txt`
            - `bindings/python/pyproject.toml`
            - `bindings/js/deno.json`
            - `bindings/dart/pubspec.yaml`
            - `bindings/julia/Project.toml`
          delete-branch: true
