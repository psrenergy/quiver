name: Publish

on:
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  detect-version:
    name: Detect version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.detect.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - id: detect
        uses: ./.github/actions/detect-version

  build-native:
    name: Build native libs
    needs: detect-version
    uses: ./.github/workflows/build-native.yml

  release:
    name: Tag and GitHub Release
    runs-on: ubuntu-latest
    needs: [detect-version, build-native]
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - uses: ncipollo/release-action@v1
        with:
          tag: v${{ needs.detect-version.outputs.version }}
          commit: ${{ github.sha }}
          generateReleaseNotes: true

      - name: Dispatch publish workflows
        env:
          GH_TOKEN: ${{ github.token }}
          VER: ${{ needs.detect-version.outputs.version }}
        run: |
          gh workflow run publish-pypi.yml  --ref "v$VER"
          gh workflow run publish-npm.yml   --ref "v$VER"
          gh workflow run publish-julia.yml --ref "v$VER"
