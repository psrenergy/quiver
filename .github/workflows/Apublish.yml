name: Publish

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6

      - uses: pypa/cibuildwheel@v3.4.1
        with:
          package-dir: bindings/python
          output-dir: wheelhouse

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  merge:
    name: Merge wheel artifacts
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/upload-artifact/merge@v7
        with:
          name: wheels
          pattern: wheels-*
          delete-merged: true

  validate:
    name: Validate release
    runs-on: ubuntu-latest
    needs: merge
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: wheels
          path: dist/

      - name: Validate tag matches pyproject.toml version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('bindings/python/pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) != pyproject.toml version ($PKG_VERSION)"
            exit 1
          fi
          echo "Version validated: $TAG_VERSION"

      - name: Validate wheel count
        run: |
          WHEEL_COUNT=$(ls dist/*.whl | wc -l)
          if [ "$WHEEL_COUNT" -ne 2 ]; then
            echo "::error::Expected 2 wheels, found $WHEEL_COUNT"
            exit 1
          fi
          echo "Wheel count validated: $WHEEL_COUNT"

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: wheels
          path: dist/

      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: dist/*.whl

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: validate
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: wheels
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1

  build-native:
    name: Build native libs (${{ matrix.platform_key }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            platform_key: linux-x86_64
            lib_glob: build/lib/libquiver*
          - os: windows-latest
            platform_key: windows-x86_64
            lib_glob: build/bin/Release/libquiver*

    steps:
      - uses: actions/checkout@v6

      - name: Configure CMake (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DQUIVER_BUILD_C_API=ON \
            -DQUIVER_BUILD_TESTS=OFF

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DQUIVER_BUILD_C_API=ON `
            -DQUIVER_BUILD_TESTS=OFF

      - name: Build
        run: cmake --build build --config Release

      - name: Set RPATH for Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y patchelf
          patchelf --set-rpath '$ORIGIN' build/lib/libquiver_c.so

      - uses: actions/upload-artifact@v7
        with:
          name: native-${{ matrix.platform_key }}
          path: ${{ matrix.lib_glob }}

  publish-jsr:
    name: Publish to JSR
    runs-on: ubuntu-latest
    needs: [validate, build-native]
    environment: jsr
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: bindings/js
    steps:
      - uses: actions/checkout@v6

      - uses: denoland/setup-deno@v2
        with:
          cache: true
          deno-version: v2.7.12

      - name: Download Linux x86_64 native libraries
        uses: actions/download-artifact@v8
        with:
          name: native-linux-x86_64
          path: bindings/js/libs/linux-x86_64/

      - name: Download Windows x86_64 native libraries
        uses: actions/download-artifact@v8
        with:
          name: native-windows-x86_64
          path: bindings/js/libs/windows-x86_64/

      # actions/upload-artifact@v4+ preserves the workspace-relative path, so
      # the Linux artifact lands at libs/linux-x86_64/build/lib/* and the
      # Windows one at libs/windows-x86_64/build/bin/Release/*. The loader
      # expects flat libs/<platform>/<libname>, so flatten here.
      - name: Flatten native library layout
        run: |
          set -e
          for p in linux-x86_64/build/lib windows-x86_64/build/bin/Release; do
            platform="${p%%/*}"
            if [ -d "libs/$p" ]; then
              mv libs/$p/* libs/$platform/
              rm -rf libs/$platform/build
            fi
          done

      - name: Verify native libraries are present
        run: |
          set -e
          required=(
            libs/linux-x86_64/libquiver.so
            libs/linux-x86_64/libquiver_c.so
            libs/windows-x86_64/libquiver.dll
            libs/windows-x86_64/libquiver_c.dll
          )
          missing=0
          for f in "${required[@]}"; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing required native library: $f"
              missing=1
            fi
          done
          echo "--- libs/ tree ---"
          find libs -type f | sort
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      # `jsr publish` respects .gitignore even when publish.include has a glob
      # (denoland/deno#22790). bindings/js/.gitignore negates *.so/*.dll rules
      # for libs/, but fail early if something still wants to exclude them.
      # --allow-dirty is required because libs/ is populated from CI artifacts,
      # not committed to git.
      - name: Dry-run jsr publish and assert libs are included
        run: |
          set -e
          npx jsr publish --dry-run --allow-slow-types --allow-dirty 2>&1 | tee /tmp/jsr-dry.log
          for f in libs/linux-x86_64/libquiver_c.so libs/windows-x86_64/libquiver_c.dll; do
            if ! grep -F -- "$f" /tmp/jsr-dry.log > /dev/null; then
              echo "::error::jsr publish dry-run would NOT include $f"
              exit 1
            fi
          done

      - name: Validate tag matches deno.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(deno eval "const c = JSON.parse(Deno.readTextFileSync('deno.json')); console.log(c.version)")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) != deno.json version ($PKG_VERSION)"
            exit 1
          fi
          echo "Version validated: $TAG_VERSION"

      - name: Publish to JSR
        run: npx jsr publish --allow-slow-types --allow-dirty
