name: Build native libs

# Builds the release native libraries once and publishes them to S3 by version, so every
# downstream publish workflow (npm, Julia) can fetch the exact same binaries on its own run —
# no rebuild, no in-run artifact threading. Runnable standalone (workflow_dispatch) for
# debugging, and reused by publish.yml (workflow_call) for the one-click release.
on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Resolve the version on a GitHub-hosted runner (which has python3) so the self-hosted
  # upload-s3 job below needs no python3 of its own. bump_version.py is the single source of
  # truth for the version; --check prints only the version and has no tag-absence gate.
  version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
      - id: v
        run: echo "version=$(python3 scripts/bump_version.py --check)" >> "$GITHUB_OUTPUT"

  build:
    name: Build native libs (${{ matrix.platform_key }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          # Ship the unversioned name AND the SONAME. The Linux build sets SOVERSION on both
          # quiver and quiver_c (src/CMakeLists.txt), so libquiver_c.so's DT_NEEDED is the
          # SONAME "libquiver.so.0" — that exact name must be present for the bundled npm
          # loader to resolve it via RPATH=$ORIGIN (the loader does no core preload on
          # Linux). Exact names, not a glob, so upload-artifact (which dereferences symlinks)
          # doesn't also ship the redundant patch-level libquiver.so.0.8.3 / libquiver_c.so.0
          # / libquiver_c.so.0.8.3 copies.
          - os: ubuntu-latest
            platform_key: linux-x86_64
            lib_paths: |
              build/lib/libquiver.so
              build/lib/libquiver.so.0
              build/lib/libquiver_c.so
          # DLLs have no SOVERSION chain and the import .lib lives in build/lib, so only the two
          # runtime DLLs live here. List them exactly (not a libquiver* glob) so a Release build's
          # libquiver*.pdb debug symbols aren't swept into the artifact and the JSR/Julia packages.
          - os: windows-latest
            platform_key: windows-x86_64
            lib_paths: |
              build/bin/Release/libquiver.dll
              build/bin/Release/libquiver_c.dll

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - uses: ./.github/actions/build-cpp
        with:
          build_type: Release
          build_tests: "OFF"

      - name: Set RPATH for Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y patchelf
          patchelf --set-rpath '$ORIGIN' build/lib/libquiver_c.so

      - uses: actions/upload-artifact@v7
        with:
          name: native-${{ matrix.platform_key }}
          path: ${{ matrix.lib_paths }}

  # The matrix runs on GitHub-hosted runners (no S3 credentials). This job runs on the
  # self-hosted runner whose ambient IAM role grants S3 write (same role generate_artifacts.jl
  # uses), pulls the just-built libs from the in-run artifacts, and publishes them to the
  # versioned S3 path that scripts/ci/native_s3.sh defines.
  upload-s3:
    name: Upload native libs to S3
    runs-on: [self-hosted, linux]
    needs: [build, version]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - name: Download Linux x86_64 native libraries
        uses: actions/download-artifact@v8
        with:
          name: native-linux-x86_64
          path: native/linux-x86_64

      - name: Download Windows x86_64 native libraries
        uses: actions/download-artifact@v8
        with:
          name: native-windows-x86_64
          path: native/windows-x86_64

      - name: Upload native libs to S3
        run: bash scripts/ci/native_s3.sh upload "${{ needs.version.outputs.version }}"
