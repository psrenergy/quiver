name: Bump Version

on:
  workflow_run:
    workflows: ["Publish"]
    types: [completed]

jobs:
  bump:
    name: Open version bump PR
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      startsWith(github.event.workflow_run.head_branch, 'v')
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: master

      - name: Compute next patch version
        id: next
        run: |
          tag="${{ github.event.workflow_run.head_branch }}"
          current="${tag#v}"
          IFS='.' read -r major minor patch <<< "$current"
          echo "version=${major}.${minor}.$((patch+1))" >> "$GITHUB_OUTPUT"

      - name: Bump version in all project files
        run: python3 scripts/bump_version.py "${{ steps.next.outputs.version }}"

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          branch: bump-version/${{ steps.next.outputs.version }}
          base: master
          commit-message: "bump version to ${{ steps.next.outputs.version }}"
          title: "Bump version to ${{ steps.next.outputs.version }}"
          body: |
            Auto-generated after release `${{ github.event.workflow_run.head_branch }}`.

            Bumps every project version file to the next patch:
            - `CMakeLists.txt`
            - `bindings/python/pyproject.toml`
            - `bindings/js/deno.json`
            - `bindings/dart/pubspec.yaml`
            - `bindings/julia/Project.toml`
          delete-branch: true
