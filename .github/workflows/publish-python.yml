name: Publish to PyPI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - uses: pypa/cibuildwheel@v4.0.0
        with:
          package-dir: bindings/python
          output-dir: wheelhouse

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  merge:
    name: Merge wheel artifacts
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/upload-artifact/merge@v7
        with:
          name: wheels
          pattern: wheels-*
          delete-merged: true
          retention-days: 7

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: merge
    if: ${{ github.event_name == 'workflow_dispatch' }}
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: wheels
          path: dist/

      - name: Validate wheels
        run: |
          shopt -s nullglob
          wheels=(dist/*.whl)
          if [ ${#wheels[@]} -eq 0 ]; then
            echo "::error::No wheels found in dist/"
            exit 1
          fi
          pip install --quiet twine
          twine check dist/*.whl
          # Ensure every platform target declared in cibuildwheel config is represented.
          required_patterns=(manylinux win_amd64)
          for pat in "${required_patterns[@]}"; do
            if ! ls dist/*${pat}*.whl >/dev/null 2>&1; then
              echo "::error::No wheel matching pattern '*${pat}*' in dist/"
              exit 1
            fi
          done
          echo "Validated ${#wheels[@]} wheel(s)"
      - uses: pypa/gh-action-pypi-publish@v1.14.0
