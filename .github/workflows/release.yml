name: Release

# Orchestrates a full release: native build to S3, then git tag + GitHub release, then the
# three binding publishes in parallel. The children run as their own top-level
# workflow_dispatch runs (via scripts/ci/dispatch_workflow.sh), NOT as reusable workflows:
# npm and PyPI trusted publishing validate the top-level workflow filename from the OIDC
# claims, so publish-js.yml / publish-python.yml must stay top-level.
#
# The bindings are dispatched on the freshly created tag (v<version>). That pins their
# workflow definition and checkout to the release commit, gives publish-python a unique
# concurrency group (its cancel-in-progress:true can't be tripped by a master push), and
# makes run correlation collision-proof. The npm/pypi GitHub environments must keep their
# deployment branch policy at "No restriction" (or allow v* tags) or tag-dispatched
# publishes will be rejected by environment protection.
#
# There is deliberately no version input: the tag must equal what the source at the released
# sha declares (scripts/assert_version.py asserts all binding manifests agree).

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref or sha to release. Default: the triggering commit."
        required: false
        default: ""

# Serialize releases: they touch global resources (S3 keys, registries, the tag namespace),
# and serialization also makes the publish-s3 run correlation race-free.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  version:
    name: Resolve version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.v.outputs.version }}
      sha: ${{ steps.v.outputs.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}
      - id: v
        run: |
          sha="$(git rev-parse HEAD)"
          v="$(python3 scripts/assert_version.py)"
          if ! [[ "$v" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::resolved version '$v' is not X.Y.Z"
            exit 1
          fi
          # ncipollo/release-action creates the tag iff missing and never moves an existing
          # one, so a stale tag would silently release the wrong commit. Fail here instead.
          # Tags are annotated: compare the peeled (^{}) commit when present.
          existing="$(git ls-remote origin "refs/tags/v$v" "refs/tags/v$v^{}" | tail -n1 | cut -f1)"
          if [ -n "$existing" ] && [ "$existing" != "$sha" ]; then
            echo "::error::tag v$v already exists at ${existing}; bump the version in CMakeLists.txt (and binding manifests) or delete the tag"
            exit 1
          fi
          if [ -n "$existing" ]; then
            echo "tag v$v already points at ${sha} — re-running the release for it"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

  publish-s3:
    name: Publish S3
    runs-on: ubuntu-latest
    needs: version
    timeout-minutes: 30
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}
      # The tag does not exist yet, so dispatch on the orchestrator's branch and pin the
      # child's checkout to the release sha explicitly.
      - name: Dispatch and watch publish-s3.yml
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          DISPATCH_REF: ${{ github.ref_name }}
          VERSION: ${{ needs.version.outputs.version }}
          SHA: ${{ needs.version.outputs.sha }}
        run: bash scripts/ci/dispatch_workflow.sh publish-s3.yml "$DISPATCH_REF" "version=$VERSION" "ref=$SHA"

  release:
    name: Tag and GitHub release
    runs-on: ubuntu-latest
    needs: [version, publish-s3]
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: ncipollo/release-action@v1
        with:
          tag: v${{ needs.version.outputs.version }}
          commit: ${{ needs.version.outputs.sha }}
          generateReleaseNotes: true
          skipIfReleaseExists: true
          makeLatest: "true"

  publish-julia:
    name: Publish Julia
    runs-on: ubuntu-latest
    needs: [version, release]
    timeout-minutes: 20
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}
      - name: Dispatch and watch publish-julia.yml
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ needs.version.outputs.version }}
        run: bash scripts/ci/dispatch_workflow.sh publish-julia.yml "v$VERSION" "version=$VERSION"

  publish-python:
    name: Publish Python
    runs-on: ubuntu-latest
    needs: [version, release]
    timeout-minutes: 30
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}
      # publish-python.yml declares only a `ref` input; on the tag, github.sha already is
      # the release commit, and undeclared inputs are a hard 422 — so pass no inputs.
      - name: Dispatch and watch publish-python.yml
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ needs.version.outputs.version }}
        run: bash scripts/ci/dispatch_workflow.sh publish-python.yml "v$VERSION"

  publish-js:
    name: Publish JS
    runs-on: ubuntu-latest
    needs: [version, release]
    timeout-minutes: 15
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}
      - name: Dispatch and watch publish-js.yml
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ needs.version.outputs.version }}
        run: bash scripts/ci/dispatch_workflow.sh publish-js.yml "v$VERSION" "version=$VERSION"
