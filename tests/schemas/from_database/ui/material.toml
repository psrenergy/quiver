id = "Material"
label.en = "Materials"
label.pt = "Materiais"

[[attribute]]
id = "label"
label.en = "Name"
label.pt = "Nome"

[[attribute]]
id = "demand"
label.en = "Demand"
label.pt = "Demanda"
unit.en = "unit/year"
unit.pt = "unidade/ano"

# Unit only declared in pt — exercises the English-first fallback to the first declared locale.
[[attribute]]
id = "pt_only_unit"
label.en = "Pt Only"
label.pt = "Apenas Pt"
unit.pt = "unidade"

# Empty unit.en must not shadow a real value in another locale.
[[attribute]]
id = "empty_en_unit"
label.en = "Empty En"
unit.en = ""
unit.pt = "kg"

# Bare (non-localized) string unit.
[[attribute]]
id = "bare_unit"
label.en = "Bare"
unit = "bare"
